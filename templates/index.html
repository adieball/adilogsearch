<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AdiIRC Log Search</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #1a1a2e; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }

  header { background: #16213e; padding: 10px 16px; border-bottom: 1px solid #0f3460; display: flex; flex-direction: column; gap: 8px; flex-shrink: 0; }

  .header-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

  #query { flex: 1; min-width: 200px; padding: 7px 12px; border-radius: 6px; border: 1px solid #0f3460; background: #0f3460; color: #e0e0e0; font-size: 0.95rem; }
  #query:focus { outline: none; border-color: #e94560; }

  .opt-label { font-size: 0.8rem; color: #888; display: flex; align-items: center; gap: 4px; white-space: nowrap; cursor: pointer; }
  .opt-label input[type=checkbox] { cursor: pointer; accent-color: #e94560; }

  input[type=date] {
    padding: 5px 8px; border-radius: 6px; border: 1px solid #0f3460;
    background: #0f3460; color: #e0e0e0; font-size: 0.82rem; cursor: pointer;
    color-scheme: dark;
  }
  input[type=date]:focus { outline: none; border-color: #e94560; }

  select { padding: 6px 10px; border-radius: 6px; border: 1px solid #0f3460; background: #0f3460; color: #e0e0e0; font-size: 0.85rem; cursor: pointer; }
  select:focus { outline: none; border-color: #e94560; }

  #search-btn { padding: 7px 18px; background: #e94560; color: #fff; border: none; border-radius: 6px; font-size: 0.95rem; cursor: pointer; white-space: nowrap; }
  #search-btn:hover { background: #c73652; }
  #search-btn:disabled { opacity: 0.5; cursor: default; }

  .divider { width: 1px; height: 20px; background: #0f3460; flex-shrink: 0; }
  .row-label { font-size: 0.75rem; color: #666; white-space: nowrap; }

  #main { display: flex; flex: 1; overflow: hidden; }

  /* Sidebar */
  #sidebar { width: 260px; background: #16213e; border-right: 1px solid #0f3460; display: flex; flex-direction: column; flex-shrink: 0; }
  #sidebar-header { padding: 10px 12px; border-bottom: 1px solid #0f3460; display: flex; justify-content: space-between; align-items: center; font-size: 0.8rem; color: #888; }
  #sidebar-header button { font-size: 0.75rem; padding: 2px 8px; border-radius: 4px; border: 1px solid #0f3460; background: transparent; color: #aaa; cursor: pointer; }
  #sidebar-header button:hover { background: #0f3460; color: #e0e0e0; }
  #file-tree { overflow-y: auto; flex: 1; padding: 6px 0; }

  .server-group { margin-bottom: 2px; }
  .server-header { display: flex; align-items: center; gap: 6px; padding: 5px 12px; cursor: pointer; font-size: 0.85rem; font-weight: 600; color: #e94560; user-select: none; }
  .server-header:hover { background: #0f3460; }
  .server-toggle { font-size: 0.7rem; color: #555; transition: transform 0.15s; display: inline-block; }
  .server-toggle.open { transform: rotate(90deg); }
  .server-cb { accent-color: #e94560; cursor: pointer; flex-shrink: 0; }
  .channel-list { padding-left: 28px; }
  .channel-item { display: flex; align-items: center; gap: 6px; padding: 3px 8px 3px 0; font-size: 0.8rem; cursor: pointer; }
  .channel-item:hover { background: #0f3460; border-radius: 4px; }
  .channel-item input { accent-color: #e94560; cursor: pointer; }
  .channel-item label { cursor: pointer; color: #ccc; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .channel-item label.archived { color: #666; font-style: italic; }

  /* Results */
  #results-pane { flex: 1; overflow-y: auto; padding: 16px; }
  #status { font-size: 0.85rem; color: #888; margin-bottom: 12px; }
  .file-result { background: #16213e; border: 1px solid #0f3460; border-radius: 8px; margin-bottom: 16px; overflow: hidden; }
  .file-result-header {
    padding: 7px 14px; background: #0f3460; font-size: 0.8rem; color: #aaa;
    display: flex; justify-content: space-between; align-items: center; gap: 10px;
  }
  .file-result-header .fh-left { display: flex; flex-direction: column; gap: 2px; overflow: hidden; }
  .file-result-header strong { color: #e94560; font-size: 0.9rem; white-space: nowrap; }
  .file-result-header .fh-path { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; direction: rtl; text-align: left; font-size: 0.75rem; }
  .open-btn {
    font-size: 0.72rem; padding: 3px 9px; border-radius: 4px;
    border: 1px solid #e94560; background: transparent; color: #e94560;
    cursor: pointer; white-space: nowrap; flex-shrink: 0;
  }
  .open-btn:hover { background: #e94560; color: #fff; }
  .open-btn.line-btn {
    border-color: #888; color: #aaa;
  }
  .open-btn.line-btn:hover { background: #888; color: #fff; }

  .match-block { border-top: 1px solid #0a0a1a; }
  .match-block:first-of-type { border-top: none; }
  .block-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 3px 14px; background: #12122a; font-size: 0.72rem; color: #555;
  }
  .log-line { display: flex; gap: 8px; padding: 2px 14px; font-family: 'Cascadia Code', 'Fira Code', monospace; font-size: 0.78rem; line-height: 1.5; }
  .log-line.match { background: rgba(233, 69, 96, 0.10); }
  .lineno { color: #444; min-width: 40px; text-align: right; flex-shrink: 0; user-select: none; }
  .log-text { white-space: pre-wrap; word-break: break-all; color: #ccc; }
  .log-text .hl { background: rgba(233, 69, 96, 0.38); color: #fff; border-radius: 2px; padding: 0 1px; }
  .separator { text-align: center; color: #444; font-size: 0.7rem; padding: 4px 0; background: #0a0a1a; }
  .spinner { display: none; color: #e94560; font-size: 0.85rem; }
  .spinner.active { display: inline; }

  /* Toast */
  #toast {
    position: fixed; bottom: 20px; right: 20px;
    background: #16213e; border: 1px solid #0f3460; border-radius: 8px;
    padding: 10px 16px; font-size: 0.82rem; color: #ccc;
    opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 99;
  }
  #toast.show { opacity: 1; }
</style>
</head>
<body>

<header>
  <div class="header-row">
    <h1 style="font-size:1.05rem;color:#e94560;letter-spacing:.04em;white-space:nowrap">AdiIRC Log Search</h1>
    <span style="font-size:0.72rem;color:#555;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1" title="{{ log_root }}">{{ log_root }}</span>
  </div>
  <div class="header-row">
    <input id="query" type="text" placeholder="Search term or regex..." autofocus>
    <label class="opt-label"><input type="checkbox" id="opt-regex"> Regex</label>
    <label class="opt-label"><input type="checkbox" id="opt-case"> Case sensitive</label>
    <div class="divider"></div>
    <label class="opt-label" title="Lines of context above and below each match">
      Context:
      <select id="opt-context">
        <option value="3">3</option>
        <option value="5" selected>5</option>
        <option value="10">10</option>
        <option value="20">20</option>
      </select>
    </label>
    <button id="search-btn">Search</button>
    <span class="spinner" id="spinner">Searching…</span>
  </div>
  <div class="header-row">
    <span class="row-label">Date range:</span>
    <label class="opt-label">From <input type="date" id="opt-date-from"></label>
    <label class="opt-label">To <input type="date" id="opt-date-to"></label>
    <button class="open-btn" onclick="clearDates()" style="margin-left:2px">Clear dates</button>
  </div>
</header>

<div id="main">
  <div id="sidebar">
    <div id="sidebar-header">
      <span>Servers &amp; Channels</span>
      <span>
        <button onclick="setAll(true)">All</button>
        <button onclick="setAll(false)">None</button>
      </span>
    </div>
    <div id="file-tree">
      {% for server, channels in tree.items() %}
      <div class="server-group" data-server="{{ server }}">
        <div class="server-header" onclick="toggleServer(this)">
          <span class="server-toggle open">&#9654;</span>
          <input type="checkbox" class="server-cb" checked onclick="serverCheck(event, '{{ server }}')">
          <span>{{ server }}</span>
        </div>
        <div class="channel-list" style="display:block">
          {% for ch in channels %}
          <div class="channel-item">
            <input type="checkbox" class="ch-cb" data-server="{{ server }}" data-path="{{ ch.path }}" checked>
            <label class="{{ 'archived' if ch.archived else '' }}" title="{{ ch.path }}">{{ ch.label }}</label>
          </div>
          {% endfor %}
        </div>
      </div>
      {% endfor %}
    </div>
  </div>

  <div id="results-pane">
    <div id="status">Select channels and enter a search term.</div>
    <div id="results"></div>
  </div>
</div>

<div id="toast"></div>

<script>
// ---------------------------------------------------------------------------
// Sidebar
// ---------------------------------------------------------------------------
function toggleServer(header) {
  const list = header.nextElementSibling;
  const toggle = header.querySelector('.server-toggle');
  const isOpen = list.style.display !== 'none';
  list.style.display = isOpen ? 'none' : 'block';
  toggle.classList.toggle('open', !isOpen);
}

function serverCheck(e, server) {
  e.stopPropagation();
  document.querySelectorAll(`.ch-cb[data-server="${server}"]`).forEach(cb => cb.checked = e.target.checked);
}

document.querySelectorAll('.ch-cb').forEach(cb => {
  cb.addEventListener('change', () => {
    const server = cb.dataset.server;
    const all = [...document.querySelectorAll(`.ch-cb[data-server="${server}"]`)];
    const serverCb = document.querySelector(`.server-group[data-server="${server}"] .server-cb`);
    serverCb.checked = all.every(c => c.checked);
    serverCb.indeterminate = !serverCb.checked && all.some(c => c.checked);
  });
});

function setAll(val) {
  document.querySelectorAll('.ch-cb, .server-cb').forEach(cb => {
    cb.checked = val;
    cb.indeterminate = false;
  });
}

function clearDates() {
  document.getElementById('opt-date-from').value = '';
  document.getElementById('opt-date-to').value = '';
}

function getSelectedPaths() {
  return [...document.querySelectorAll('.ch-cb:checked')].map(cb => cb.dataset.path);
}

// ---------------------------------------------------------------------------
// Toast
// ---------------------------------------------------------------------------
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

// ---------------------------------------------------------------------------
// Open file
// ---------------------------------------------------------------------------
async function openFile(path, line, jump) {
  try {
    const resp = await fetch('/open', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({path, line, jump: !!jump})
    });
    const data = await resp.json();
    if (data.error) {
      showToast('Could not open file: ' + data.error);
    } else if (data.ok) {
      const editorLabel = data.editor === 'default' ? 'default app' : data.editor;
      const lineInfo = (jump && data.line_supported) ? ` at line ${line}` : '';
      const fallbackNote = (jump && !data.line_supported) ? ' (no line-jump support, opened at start)' : '';
      showToast(`Opened in ${editorLabel}${lineInfo}${fallbackNote}`);
    }
  } catch(e) {
    showToast('Could not open file: ' + e);
  }
}

// ---------------------------------------------------------------------------
// Search
// ---------------------------------------------------------------------------
function escapeHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function highlight(text, pattern, isRegex, caseSensitive) {
  try {
    const flags = caseSensitive ? 'g' : 'gi';
    let rx;
    if (isRegex) {
      rx = new RegExp(pattern, flags);
    } else {
      const escaped = pattern.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      rx = new RegExp(escaped, flags);
    }
    return escapeHtml(text).replace(rx, m => `<span class="hl">${escapeHtml(m)}</span>`);
  } catch(e) { return escapeHtml(text); }
}

async function doSearch() {
  const query = document.getElementById('query').value.trim();
  if (!query) return;
  const paths = getSelectedPaths();
  if (!paths.length) { document.getElementById('status').textContent = 'No channels selected.'; return; }

  const spinner = document.getElementById('spinner');
  spinner.classList.add('active');
  document.getElementById('search-btn').disabled = true;
  document.getElementById('results').innerHTML = '';
  document.getElementById('status').textContent = 'Searching\u2026';

  const context       = parseInt(document.getElementById('opt-context').value);
  const useRegex      = document.getElementById('opt-regex').checked;
  const caseSensitive = document.getElementById('opt-case').checked;
  const dateFrom      = document.getElementById('opt-date-from').value;
  const dateTo        = document.getElementById('opt-date-to').value;

  try {
    const resp = await fetch('/search', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        query, paths, context,
        use_regex: useRegex,
        case_sensitive: caseSensitive,
        date_from: dateFrom,
        date_to: dateTo,
      })
    });
    const data = await resp.json();
    renderResults(data, query, useRegex, caseSensitive);
  } catch(e) {
    document.getElementById('status').textContent = 'Error: ' + e;
  } finally {
    spinner.classList.remove('active');
    document.getElementById('search-btn').disabled = false;
  }
}

// ---------------------------------------------------------------------------
// Render
// ---------------------------------------------------------------------------
function renderResults(data, query, isRegex, caseSensitive) {
  const container = document.getElementById('results');
  container.innerHTML = '';
  const totalBlocks = data.reduce((s, f) => s + f.blocks.length, 0);

  let statusText = totalBlocks === 0 ? 'No matches found.' :
    `${totalBlocks} match block${totalBlocks !== 1 ? 's' : ''} in ${data.length} file${data.length !== 1 ? 's' : ''}.`;
  document.getElementById('status').textContent = statusText;

  if (totalBlocks === 0) return;

  for (const file of data) {
    const wrap = document.createElement('div');
    wrap.className = 'file-result';

    const fname = file.filename.split('/').pop();
    const hdr = document.createElement('div');
    hdr.className = 'file-result-header';
    hdr.innerHTML = `
      <div class="fh-left">
        <strong>${escapeHtml(fname)}</strong>
        <span class="fh-path">${escapeHtml(file.filename)}</span>
      </div>
      <button class="open-btn" title="Open file in associated app">Open file</button>`;
    hdr.querySelector('.open-btn').addEventListener('click', () => openFile(file.filename, 1, false));
    wrap.appendChild(hdr);

    file.blocks.forEach((block, bi) => {
      if (bi > 0) {
        const sep = document.createElement('div');
        sep.className = 'separator';
        sep.textContent = '\u00b7 \u00b7 \u00b7';
        wrap.appendChild(sep);
      }

      const blockDiv = document.createElement('div');
      blockDiv.className = 'match-block';

      // Block bar: range info + jump button
      const bar = document.createElement('div');
      bar.className = 'block-bar';
      bar.innerHTML = `<span>line ${block.first_match_line}</span>`;
      const jumpBtn = document.createElement('button');
      jumpBtn.className = 'open-btn line-btn';
      jumpBtn.textContent = `Open at line ${block.first_match_line}`;
      jumpBtn.addEventListener('click', () => openFile(file.filename, block.first_match_line, true));
      bar.appendChild(jumpBtn);
      blockDiv.appendChild(bar);

      block.lines.forEach(line => {
        const row = document.createElement('div');
        row.className = 'log-line' + (line.is_match ? ' match' : '');
        const textHtml = line.is_match
          ? highlight(line.text, query, isRegex, caseSensitive)
          : escapeHtml(line.text);
        row.innerHTML = `<span class="lineno">${line.lineno}</span><span class="log-text">${textHtml}</span>`;
        blockDiv.appendChild(row);
      });

      wrap.appendChild(blockDiv);
    });

    container.appendChild(wrap);
  }
}

// ---------------------------------------------------------------------------
// Event wiring
// ---------------------------------------------------------------------------
document.getElementById('query').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch();
});
document.getElementById('search-btn').addEventListener('click', doSearch);
</script>
</body>
</html>
